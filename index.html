<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="HD8KDYXOf0uI-DDoti_Sfj9fmI_6sjGNzTHrk-BYxIU" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>TO-DO app</title>
</head>

<body>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Pliant:ital,wdth,wght@0,112.5,100..900;1,112.5,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap");
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    min-height: 100vh;
    background: radial-gradient(circle at center,
            #3A3F44 0%,
            #2A2D32 60%,
            #1A1C1E 100%);
    display: flex;
    justify-content: center;
    padding: 20px;
}

.main {
    width: 100%;
    max-width: 700px;
}

.heading h3 {
    color: white;
    text-align: center;
    font-size: clamp(2rem, 6vw, 4rem);
    margin-bottom: 20px;
    border-bottom: 2px solid white;
    padding-bottom: 10px;
}

.input {
    display: flex;
    gap: 10px;
    margin-bottom: 25px;
}

#input {
    flex: 1;
    padding: 15px;
    font-size: 1.1rem;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #111;
    color: white;
}

.add {
    padding: 15px 25px;
    border: none;
    border-radius: 10px;
    background: #3498db;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: .3s;
}

.add:hover {
    transform: translateY(-2px);
    background: #2980b9;
}

.output {
    background: #111;
    border-radius: 15px;
    padding: 20px;
    min-height: 150px;
    box-shadow: 0 0 15px rgba(0,0,0,.4);
}

#list {
    list-style-position: inside;
}

#list li {
    color: white;
    font-size: 1.1rem;

    display: flex;
    justify-content: space-between;
    align-items: center;

    gap: 10px;
    padding: 12px;
    margin-bottom: 10px;

    background: #1f1f1f;
    border-radius: 10px;

    overflow-wrap: break-word;
    word-wrap: break-word;
    word-break: break-word;
}

.delete-btn {
    color: red;
    cursor: pointer;
    flex-shrink: 0;
    font-size: 1.2rem;
}

@media (max-width: 600px) {
    .input {
        flex-direction: column;
    }

    .add {
        width: 100%;
    }
}
    </style>

    <div class="main">
        <div class="heading">
            <h3>To Do Application</h3>
        </div>
        <div class="input">
            <input id="input" type="text" placeholder="Add items">
            <div class="btn">
                <button class="add" onclick="addItem()">
                    Add-Item
                </button>
            </div>
        </div>
        <div class="output">
            <div class="items">
                <ul id="list">

                </ul>
            </div>
        </div>
        <footer style="text-align: center; margin-top: 50px;">
                    <p style="color: gray; ">
                <i class="fas fa-code"></i> Developer Mohammad wasayullah <br />
                &copy; All rights reserved 2026
            </p>
        </footer>
    </div>


    <script src="app.js"></script>
</body>

</html>
